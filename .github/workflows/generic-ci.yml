name: generic-ci

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generic-build:
    name: Generic build (Debian)
    runs-on:
      - self-hosted
      - linux
      - x64
      - debian
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: Configure
        run: >-
          cmake -S . -B build-ci-generic
          -DGNSSHAT_PLATFORM=generic
          -DNTRIP_TLS_SUPPORT=ON
          -DBUILD_TOOLS=ON
          -DBUILD_TESTS=ON
          -DBUILD_EXAMPLES=OFF
          -DBUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build-ci-generic --parallel "$(nproc)"

      - name: Test
        run: ctest --test-dir build-ci-generic --output-on-failure